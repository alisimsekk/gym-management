version: '3.8'
name: 'gym-management-local'

services:
  gym-management-postgres-local:
    container_name: gym-management-postgres-local
    image: postgres:16.8-alpine
    environment:
      POSTGRES_DB: gym-management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - "15432:5432"
    volumes:
      - gym-management-postgres-local-data:/var/lib/postgresql/data

  mongo:
    image: mongo:8.0.14
    container_name: gym-management-report-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: gym-management-report-mongo-express
    restart: unless-stopped
    ports:
      - "18081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: example
    depends_on:
      - mongo

volumes:
  gym-management-postgres-local-data:
  mongo_data: